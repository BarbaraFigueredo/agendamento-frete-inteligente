version: "3.9"

volumes:
  postgres_data:
  redis_data:
  static_files:

networks:
  freight_net:
    driver: bridge

services:

  # ── Banco de dados ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: freight_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-freight_db}
      POSTGRES_USER:     ${POSTGRES_USER:-freight_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-freight_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-freight_user} -d ${POSTGRES_DB:-freight_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - freight_net

  # ── Cache / Broker ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: freight_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - freight_net

  # ── Backend Django ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: freight_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: freight_flow.settings.development
    volumes:
      - ./backend:/app
      - static_files:/app/staticfiles
    ports:
      - "8005:8005"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - freight_net
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8005"

  # ── Frontend React ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: freight_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5175:5175"
    depends_on:
      - backend
    networks:
      - freight_net
